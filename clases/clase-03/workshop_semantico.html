<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Del wireframe al HTML semántico</title>
  <style>
    /* ==========================================
       ESTILOS GENERALES
       ========================================== */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f3f4f6;
      color: #334155;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }



    /* ==========================================
       1. HEADER SEMÁNTICO (Color Azul Oscuro)
       ========================================== */
    header {
      background-color: #1a365d; /* Azul oscuro del wireframe */
      color: #ffffff;
      padding: 20px;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 80px;
      box-sizing: border-box;
      font-family: monospace;
      font-size: 1.1rem;
    }

    .header-label {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Formulario de búsqueda (Instrucción del taller) */
    .search-form {
      display: flex;
      gap: 8px;
      align-items: center;
      font-family: sans-serif;
      font-size: 0.9rem;
      background-color: rgba(255, 255, 255, 0.1);
      padding: 8px;
      border-radius: 4px;
      border: 1px dashed rgba(255, 255, 255, 0.3);
    }

    .search-form label {
      color: #cbd5e1;
    }

    .search-form input[type="search"] {
      padding: 6px;
      border-radius: 4px;
      border: 1px solid #475569;
      background-color: #0f172a;
      color: white;
    }

    .search-form button {
      padding: 6px 12px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .search-form button:hover {
      background-color: #1d4ed8;
    }

    /* ==========================================
       DISTRIBUCIÓN EN TRES COLUMNAS (GRID)
       ========================================== */
    .columns {
      display: grid;
      grid-template-columns: 1fr 2fr 1.2fr;
      gap: 15px;
      min-height: 380px;
    }

    /* ==========================================
       2. ASIDE FILTROS (Azul)
       ========================================== */
    aside.filters {
      background-color: #2b6cb0; /* Azul del wireframe */
      color: #ffffff;
      padding: 20px;
      border-radius: 4px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-family: monospace;
      font-size: 1.2rem;
      font-weight: bold;
    }

    /* ==========================================
       3. MAIN + ARTICLE (Azul Claro)
       ========================================== */
    main {
      background-color: #3182ce; /* Azul claro del wireframe */
      color: #ffffff;
      padding: 20px;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: monospace;
      font-size: 1.1rem;
      gap: 15px;
    }

    article {
      border: 2px dashed rgba(255, 255, 255, 0.8);
      padding: 25px;
      border-radius: 4px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 15px;
      min-width: 250px;
    }

    article h1 {
      border: 1px solid rgba(255, 255, 255, 0.6);
      padding: 8px;
      margin: 0;
      font-size: 1.1rem;
      background-color: rgba(255, 255, 255, 0.15);
    }

    article p {
      border: 1px solid rgba(255, 255, 255, 0.6);
      padding: 8px;
      margin: 0;
      font-size: 1.1rem;
      background-color: rgba(255, 255, 255, 0.15);
    }

    /* ==========================================
       4. ASIDE RELACIONADOS (Naranja)
       ========================================== */
    aside.related {
      background-color: #dd6b20; /* Naranja del wireframe */
      color: #ffffff;
      padding: 20px;
      border-radius: 4px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-family: monospace;
      font-size: 1.2rem;
      font-weight: bold;
    }

    /* ==========================================
       5. FOOTER SEMÁNTICO (Pie de Página - Azul Oscuro)
       ========================================== */
    footer {
      background-color: #1a365d; /* Azul oscuro del wireframe */
      color: #ffffff;
      padding: 20px;
      border-radius: 4px;
      text-align: center;
      font-family: monospace;
      font-size: 1.1rem;
      min-height: 60px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-sizing: border-box;
    }


  </style>
</head>
<body>

  <div class="container">


    <!-- HEADER SEMÁNTICO -->
    <header>
      <div class="header-label">
        &lt;header&gt; logo + &lt;nav&gt;
      </div>
      
      <!-- Formulario de búsqueda (Instrucción 2) -->
      <form class="search-form" action="#" method="GET">
        <label for="search-input">Buscar:</label>
        <input type="search" id="search-input" name="q" placeholder="Buscar..." required>
        <button type="submit">Buscar</button>
      </form>
    </header>

    <!-- CONTENEDOR EN TRES COLUMNAS -->
    <div class="columns">
      
      <!-- ASIDE FILTROS -->
      <aside class="filters">
        &lt;aside&gt;<br>Filters
      </aside>

      <!-- MAIN CONTENIDO PRINCIPAL -->
      <main>
        &lt;main&gt;
        <article>
          &lt;article&gt;
          <h1>&lt;h1&gt;</h1>
          <p>&lt;p&gt;</p>
          &lt;/article&gt;
        </article>
        &lt;/main&gt;
      </main>

      <!-- ASIDE RELACIONADOS -->
      <aside class="related">
        &lt;aside&gt;<br>Related
      </aside>

    </div>

    <!-- FOOTER SEMÁNTICO -->
    <footer>
      &lt;footer&gt; © UTN 2026
    </footer>



  </div>

</body>
</html>
