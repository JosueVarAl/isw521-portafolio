<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tarjeta ISW-521</title>
  <style>

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      width: 500px;
      margin: 16px;
      border: 2px solid #ccc;
      background-color: #ffffff;
    }

    .card-header {
      background-color: #1a365d;
      color: #ffffff;
      padding: 20px;
      font-size: 32px;
      font-weight: bold;
    }

    .card-separator {
      height: 6px;
      background-color: #eab308;
    }

    .card-body {
      padding: 20px;
    }

    .card-title {
      color: #1a365d;
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .card-text {
      color: #4b5563;
      font-size: 16px;
      margin-bottom: 20px;
      line-height: 1.4;
    }

    .card-button {
      display: block;
      width: 100%;
      background-color: #1a365d;
      color: #eab308;
      text-align: center;
      padding: 12px;
      text-decoration: none;
      font-weight: bold;
      border: none;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="card-header">
      ISW-521
    </div>
    <div class="card-separator"></div>
    <div class="card-body">
      <div class="card-title">Programación en Ambiente Web I</div>
      <p class="card-text">Aprende a construir aplicaciones web modernas con HTML, CSS y JavaScript.</p>
      <a href="#" class="card-button">Ver curso &rarr;</a>
    </div>
  </div>

</body>
</html>
